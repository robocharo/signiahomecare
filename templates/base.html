<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
    <title>{% block title %}{{ page_title | default('Signia Home Care | Minneapolis & Twin Cities') }}{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}{{ meta_description | default('Signia Home Care provides compassionate, dignified home care services in Minneapolis, Minnesota and the Twin Cities.') }}{% endblock %}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% include 'components/header.html' %}

    <main id="main-content">
        {% block content %}{% endblock %}
    </main>

    {% include 'components/footer.html' %}

    {% block scripts %}{% endblock %}
</body>
</html>
