<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c5aa0;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#4a7bc8;stop-opacity:0.9"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="white" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="1920" height="600" fill="url(#grad)"/>
  <rect width="1920" height="600" fill="url(#dots)"/>
</svg>
